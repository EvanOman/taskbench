# Railway config-as-code for the Planka service.
# This file is read by Railway when deploying from a linked repo.
# See https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"
# Not used directly — the Planka service is deployed from the Docker
# image ghcr.io/plankanban/planka:latest, not from source. This file
# documents the intended deploy settings for reference / future use if
# Railway adds image-based config-as-code support.

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
