services:
  planka:
    # Pinned to the same digest as the Railway deployment for reproducibility.
    # To bump: `docker pull ghcr.io/plankanban/planka:latest && docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/plankanban/planka:latest`
    image: ghcr.io/plankanban/planka@sha256:19b507ae3ab5cb1855c3f6984249e4a4881ed0b912febdfd492139c29bf10f39
    restart: on-failure
    volumes:
      - planka-data:/app/data
    ports:
      - "18920:1337"
    environment:
      - BASE_URL=http://localhost:18920
      - DATABASE_URL=postgresql://postgres@postgres/planka
      - SECRET_KEY=a3f8d2e1b9c7456089abcdef12345678fedcba9876543210
      - DEFAULT_ADMIN_EMAIL=admin@local
      - DEFAULT_ADMIN_PASSWORD=Planka!Admin2025#Secure
      - DEFAULT_ADMIN_NAME=Admin
      - DEFAULT_ADMIN_USERNAME=admin
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    # Aligned with production deployment (15-alpine) so behavior matches.
    image: postgres:15-alpine
    restart: on-failure
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=planka
      - POSTGRES_HOST_AUTH_METHOD=trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d planka"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  planka-data:
  postgres-data:
