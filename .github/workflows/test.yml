name: Test

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ master, develop ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.14 dropped: pydantic-core build fails on PyO3 0.24 (upstream).
        # Re-add when pydantic ships a 3.14-compatible wheel.
        python-version: ["3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --dev

    - name: Run linting
      run: uv run ruff check

    - name: Run formatting check
      run: uv run ruff format --check

    - name: Run type checking
      run: uv run ty check

    - name: Run tests with coverage
      run: uv run pytest --cov=taskbench --cov-report=xml --cov-report=term-missing

    - name: Audit dependencies for known vulnerabilities (issue #67 P3)
      # Runs once per matrix entry; lightweight (a single PyPI lookup per dep).
      # Failure here gates the merge — exactly the point of a security tier.
      # `--path .venv` audits the project env, not pip-audit's tool env.
      run: uv tool run pip-audit --strict --path .venv

    - name: Generate coverage badge
      if: matrix.python-version == '3.13' && github.ref == 'refs/heads/master'
      run: |
        mkdir -p assets
        uv run genbadge coverage -i coverage.xml -o assets/coverage.svg

    - name: Commit coverage badge
      # Branch protection requires PRs for master; this step is best-effort.
      # Failure here doesn't gate the build — coverage results are still generated.
      continue-on-error: true
      if: matrix.python-version == '3.13' && github.ref == 'refs/heads/master'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add assets/coverage.svg
        git diff --staged --quiet || git commit -m "chore: update coverage badge [skip ci]"
        git push
